<!DOCTYPE html>
<html>
<head>
<title>AI Control Panel</title>
<link href='https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap' rel='stylesheet'>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:'Inter',sans-serif;
    background:#0d1117;
    color:#e6edf3;
    overflow-x:hidden;
}

/* Animated particles */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle at 20% 30%, rgba(0,198,255,0.1), transparent 40%),
               radial-gradient(circle at 80% 70%, rgba(0,114,255,0.1), transparent 40%);
    animation: moveBg 10s infinite alternate;
    z-index:-1;
}
@keyframes moveBg {
    0%{transform:translateY(0px);}
    100%{transform:translateY(-40px);}
}

.sidebar {
    position:fixed;
    left:0;
    top:0;
    width:220px;
    height:100vh;
    background:rgba(255,255,255,0.03);
    backdrop-filter:blur(15px);
    border-right:1px solid rgba(255,255,255,0.08);
    padding-top:40px;
}

.sidebar h2 {
    text-align:center;
    font-weight:500;
    color:#00c6ff;
}

.sidebar a {
    display:block;
    padding:15px 25px;
    color:#e6edf3;
    text-decoration:none;
    transition:0.3s;
}

.sidebar a:hover {
    background:rgba(0,198,255,0.1);
}

.main {
    margin-left:240px;
    padding:50px;
}

h1 {
    font-weight:600;
    letter-spacing:2px;
}

.stats {
    display:flex;
    gap:20px;
    margin:30px 0;
}

.card {
    flex:1;
    background:rgba(255,255,255,0.04);
    padding:20px;
    border-radius:12px;
    box-shadow:0 15px 30px rgba(0,0,0,0.5);
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
}

table {
    width:100%;
    border-collapse:collapse;
    margin-top:30px;
}

th, td {
    padding:15px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

th {
    color:#00c6ff;
}

.clock {
    font-size:18px;
    margin-top:10px;
    color:#00c6ff;
}

.btn {
    margin-top:20px;
    padding:12px 25px;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover {
    box-shadow:0 10px 25px rgba(0,198,255,0.5);
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>AI PANEL</h2>
    <a href="/">Dashboard</a>
    <a href="/attendance">Scanner</a>
</div>

<div class="main">
    <h1>AI ATTENDANCE CONTROL</h1>
    <div class="clock" id="clock"></div>

    <div class="stats">
        <div class="card">
            <p>Total Records</p>
            <h2>{{ records|length }}</h2>
        </div>
        <div class="card">
            <p>Status</p>
            <h2>ONLINE</h2>
        </div>
        <div class="card">
            <p>Mode</p>
            <h2>RECOGNITION ACTIVE</h2>
        </div>
    </div>

    <canvas id="attendanceChart" height="100"></canvas>

    <table>
        <tr>
            <th>Name</th>
            <th>Date</th>
            <th>Time</th>
        </tr>
        {% for record in records %}
        <tr>
            <td>{{ record.name }}</td>
            <td>{{ record.date }}</td>
            <td>{{ record.time }}</td>
        </tr>
        {% endfor %}
    </table>

    <a href="/attendance"><button class="btn">Launch Scanner</button></a>
</div>

<script>
// Live Clock
function updateClock(){
    const now=new Date();
    document.getElementById("clock").innerHTML=now.toLocaleString();
}
setInterval(updateClock,1000);
updateClock();

// Chart
const ctx=document.getElementById('attendanceChart');
new Chart(ctx,{
    type:'bar',
    data:{
        labels:['Total Records'],
        datasets:[{
            label:'Attendance Count',
            data:[{{ records|length }}],
            backgroundColor:'#00c6ff'
        }]
    },
    options:{
        plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true}}
    }
});
</script>

</body>
</html>
