<!DOCTYPE html>
<html>
<head>
    <title>Scanner</title>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap' rel='stylesheet'>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            text-align: center;
        }

        h2 {
            margin-top: 40px;
            font-weight: 500;
        }

        .camera-box {
            margin-top: 30px;
            display: inline-block;
            padding: 10px;
            border: 1px solid #00c6ff;
        }

        .btn {
            margin-top: 30px;
            padding: 12px 30px;
            border: 1px solid #00c6ff;
            color: #00c6ff;
            background: transparent;
            cursor: pointer;
        }

        .btn:hover {
            background: #00c6ff;
            color: #0d1117;
        }
    </style>
</head>
<body>

<h2>FACE SCANNER ACTIVE</h2>

<div class="camera-box">
    <img src="{{ url_for('main.video') }}" width="700">
</div>

<br>

<button class="btn" id="markBtn" onclick="markAttendance()">Mark Attendance</button>

<br><br>
<a href="/" style="color:#00c6ff;">Back to Dashboard</a>

<script>
async function markAttendance() {
    const res = await fetch('/current_name');
    const data = await res.json();

    if(data.name === "Unknown") {
        alert("No valid face detected");
        return;
    }

    window.location.href = "/mark/" + data.name;
}
</script>

</body>
</html>
